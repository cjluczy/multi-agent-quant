version: 0.1.0
system:
  mode: realtime
  timezone: Asia/Shanghai
  market: cn
  capital_base: 1000000
  loop_iterations: 20
  poll_interval_seconds: 15
  risk_budget:
    max_drawdown: 0.12
    var_limit: 0.08
    exposure_limit: 1.0

feeds:
  market:
    type: tushare_realtime
    symbols:
      - 510300.SH
      - 600519.SH
      - 000001.SZ
    poll_interval_seconds: 15
    token_env: TUSHARE_TOKEN
    fallback_provider: easyquotation
    provider: sina
    feature_window: 20
  fundamental:
    type: tushare
    fields:
      - roe
      - pe_ttm
      - revenue_yoy
  news:
    type: synthetic
    refresh_interval: 60
    languages:
      - zh
    symbols:
      - 510300.SH
      - 600519.SH
  sentiment:
    type: synthetic_news
    languages:
      - zh
    llm_summarizer: qwen2.5:32b

reasoning:
  llm_router:
    default: qwen2.5:32b
    fallbacks:
      - glm4:9b
      - gpt-4o-mini
  context_store:
    type: sqlite
    path: data/rag_store.db

strategy_factory:
  templates:
    - pair_trade
    - trend_follow
    - event_driven
  autogen:
    enabled: true
    max_candidates: 12
  genetic:
    population: 24
    elitism: 0.2

agents:
  scheduler:
    heartbeat_seconds: 2
    max_concurrent: 6
  registry:
    - id: news-alpha
      role: news_event
      capital_ratio: 0.18
      enabled: true
    - id: reactive-hft
      role: reactive
      capital_ratio: 0.2
      enabled: true
    - id: swing-scout
      role: swing
      capital_ratio: 0.14
      enabled: true
    - id: index-hedge
      role: futures_hedge
      capital_ratio: 0.1
      enabled: true
    - id: mean-revert-core
      role: mean_reversion
      capital_ratio: 0.14
      enabled: true
    - id: breakout-beta
      role: breakout
      capital_ratio: 0.12
      enabled: true
    - id: quality-focus
      role: fundamental
      capital_ratio: 0.12
      enabled: true

market_simulation:
  liquidity_model: cn_order_book
  shock_scenarios:
    - flash_crash
    - vol_spike
  adversaries:
    spoofing: true
    momentum_ignition: true
  slippage_bps: 8

portfolio_brain:
  optimizer: risk_parity
  bandit:
    type: ucb
    exploration: 0.25
  min_trade_notional: 5000
  per_trade_nav_pct: 0.1
  loser_deweight_enabled: true
  loser_deweight_floor: 0.35
  loser_deweight_slope: 3.0

risk_engine:
  controls:
    kill_switch: false
    circuit_breaker: 0.05
    position_limit_pct: 0.35
    min_confidence: 0.45
    max_volatility: 0.8
    max_stock_position_pct: 0.3
    max_futures_contracts_per_symbol: 2
    max_futures_margin_pct: 0.28
    max_futures_notional_pct: 0.7
    max_gross_exposure_pct: 0.95

execution:
  venues:
    - name: sim-ctp
      type: paper
      adapter: ctp
  default_venue: sim-ctp
  lot_size: 100
  futures_multiplier:
    IH9999.CCFX: 300
  futures_margin_rate: 0.12
  futures_maintenance_margin_rate: 0.1
  futures_fee_rate: 0.000023
  stock_commission_rate: 0.00025
  stock_min_commission: 5.0
  stock_stamp_duty_rate: 0.0005
  stock_transfer_fee_rate: 0.00001
  stock_bid_ask_spread_bps: 6.0
  blotter_path: runtime/tushare_live_blotter.jsonl

logging:
  level: INFO
  sink: logs/system.log
